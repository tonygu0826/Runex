name: Daily SEO article

on:
  schedule:
    # Use Toronto time directly so daylight-saving changes do not shift publication.
    # The second run is a backup and skips automatically when today's article exists.
    - cron: "7 9 * * *"
      timezone: "America/Toronto"
    - cron: "37 9 * * *"
      timezone: "America/Toronto"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/daily-seo-article.yml"
  workflow_dispatch:
    inputs:
      topic:
        description: "Optional article topic override"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: daily-seo-article
  cancel-in-progress: false

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check whether today's article already exists
        id: freshness
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TODAY="$(TZ=America/Toronto date +%F)"
          if grep -Fq "$TODAY" app/insights/articles.ts; then
            echo "Article for $TODAY already exists; skipping this run."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "No article for $TODAY; publishing now."
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.freshness.outputs.should_publish == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Generate article with DeepSeek
        if: steps.freshness.outputs.should_publish == 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: deepseek-v4-flash
          ARTICLE_TOPIC: ${{ inputs.topic }}
        run: node scripts/generate-seo-article.mjs

      - name: Install dependencies
        if: steps.freshness.outputs.should_publish == 'true'
        run: npm ci

      - name: Verify production build
        if: steps.freshness.outputs.should_publish == 'true'
        run: npm run build

      - name: Commit article
        if: steps.freshness.outputs.should_publish == 'true'
        run: |
          git config user.name "runex-seo-bot"
          git config user.email "actions@users.noreply.github.com"
          git add app/insights/articles.ts
          if git diff --cached --quiet; then
            echo "No article changes to commit."
            exit 0
          fi
          git commit -m "Publish daily logistics insight"
          git push
