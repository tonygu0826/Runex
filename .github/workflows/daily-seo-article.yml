name: Daily SEO article

on:
  schedule:
    # 13:00 UTC is 09:00 in Toronto during daylight-saving time.
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      topic:
        description: "Optional article topic override"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: daily-seo-article
  cancel-in-progress: false

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Generate article with DeepSeek
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: deepseek-v4-flash
          ARTICLE_TOPIC: ${{ inputs.topic }}
        run: node scripts/generate-seo-article.mjs

      - name: Install dependencies
        run: npm ci

      - name: Verify production build
        run: npm run build

      - name: Commit article
        run: |
          git config user.name "runex-seo-bot"
          git config user.email "actions@users.noreply.github.com"
          git add app/insights/articles.ts
          if git diff --cached --quiet; then
            echo "No article changes to commit."
            exit 0
          fi
          git commit -m "Publish daily logistics insight"
          git push
